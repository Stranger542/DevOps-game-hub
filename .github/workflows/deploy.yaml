name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Triggers the workflow when you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/game-hub-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/game-hub-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create project directory on EC2
            mkdir -p ~/game-hub
            cd ~/game-hub
            
            # Dynamically create the docker-compose.yml file on the server
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: ${{ secrets.DOCKER_USERNAME }}/game-hub-backend:latest
                ports:
                  - "5000:5000"
                restart: always
              frontend:
                image: ${{ secrets.DOCKER_USERNAME }}/game-hub-frontend:latest
                ports:
                  - "80:80"
                restart: always
            EOF
            
            # Log in to Docker Hub on EC2 to pull private/latest images (optional but good practice)
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull the latest images from Docker Hub and restart the containers
            sudo docker compose pull
            sudo docker compose up -d
